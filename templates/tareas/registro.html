<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <style>
        body {
            display: flex;
            justify-content: center;   
            align-items: center;       
            height: 100vh;             
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .link-login {
            margin-top: 15px;
            display: block;
            color: #007BFF;
            text-decoration: none;
        }

        .link-login:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Crear cuenta</h2>
        <form id="registroForm" method="post" novalidate>
            <input type="text" id="usuarioId" name="usuario" placeholder="Nombre de usuario" required><br>
            <input type="email" id="correoId" name="correo" placeholder="Correo electrónico"><br>
            <input type="password" id="contraseñaId" name="contraseña" placeholder="Contraseña" required><br>
            <button type="submit">Registrarse</button>
        </form>

        <div id="msgBox" style="margin-top:10px;"></div>

        <a href="{% url 'login' %}" class="link-login">¿Ya tienes cuenta? Inicia sesión</a>
    </div>

    <script>
        const API_BASE_URL = "http://localhost:8000/api";

        //REGISTRO
        const msgBox = document.getElementById("msgBox");

        async function registro(usuario, correo, contraseña) {
            try {
                const response = await fetch(`${API_BASE_URL}/registro/`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: usuario,
                        email: correo,
                        password: contraseña
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    msgBox.textContent = "Registro exitoso";
                    msgBox.style.color = "green";

                    setTimeout(() => {
                        window.location.href = "{% url 'login' %}";
                    }, 1000);

                } else {
                    let errores = "";
                    for (const campo in data) {
                        errores += `${data[campo].join(", ")}\n`;
                    }
                    msgBox.textContent = errores;
                    msgBox.style.color = "red";
                    console.log("Detalle del error:", data);
                }
            } catch (error) {
                console.error("Error en la petición:", error);
                msgBox.textContent = "Ocurrió un problema de conexión con el servidor.";
                msgBox.style.color = "orange";
            }
        }

        const form = document.getElementById("registroForm");
        form.addEventListener("submit", function(event) {
            event.preventDefault();
            const usuario = document.getElementById("usuarioId").value.trim();
            const correo = document.getElementById("correoId").value.trim();
            const contraseña = document.getElementById("contraseñaId").value.trim();

            if (!usuario || !contraseña) {
                msgBox.textContent = "Debes incluir usuario y contraseña.";
                msgBox.style.color = "red";
                return;
            }

            registro(usuario, correo, contraseña);
        });
    </script>

</body>
</html>
