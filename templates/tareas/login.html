<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
    }
 
    /* ── Contenedor principal ── */
    .contenedor {
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: auto 1fr;
      gap: 20px;
      width: 100%;
      max-width: 900px;
      align-items: start;
    }
 
    /* ── Card base (mismo estilo del login original) ── */
    .form-container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }
 
    .form-container h2 {
      font-size: 16px;
      color: #333;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid #007BFF;
    }
 
    /* ── Bloque temperatura ── */
    .bloque-temperatura {
      grid-column: 1;
      grid-row: 1;
      text-align: center;
    }
 
    .temperatura-valor {
      font-size: 52px;
      font-weight: bold;
      color: #007BFF;
      line-height: 1;
      margin: 16px 0 8px;
    }
 
    .temperatura-ciudad {
      font-size: 13px;
      color: #888;
    }
 
    .temperatura-icono {
      font-size: 36px;
      margin-bottom: 8px;
      display: block;
    }
 
    /* ── Bloque login ── */
    .bloque-login {
      grid-column: 1;
      grid-row: 2;
    }
 
    .bloque-login input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
 
    .bloque-login input:focus {
      outline: none;
      border-color: #007BFF;
      box-shadow: 0 0 0 2px rgba(0,123,255,0.15);
    }
 
    .bloque-login button {
      background-color: #007BFF;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      margin-top: 12px;
      font-size: 14px;
    }
 
    .bloque-login button:hover {
      background-color: #0056b3;
    }
 
    .link-login {
      margin-top: 15px;
      display: block;
      color: #007BFF;
      text-decoration: none;
      font-size: 13px;
      text-align: center;
    }
 
    .link-login:hover {
      text-decoration: underline;
    }
 
    /* ── Bloque noticias ── */
    .bloque-noticias {
    grid-column: 2;
    grid-row: 1 / 3;
    max-height: 500px;    
    overflow-y: auto;
    }
 
    .lista-noticias {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
 
    .lista-noticias li {
      padding: 12px 14px;
      border-radius: 4px;
      border-left: 3px solid #007BFF;
      background-color: #f0f7ff;
      font-size: 14px;
      color: #333;
      line-height: 1.5;
      cursor: pointer;
      transition: background-color 0.2s;
    }
 
    .lista-noticias li:hover {
      background-color: #daeeff;
    }

    </style>
</head>
<body>
    <div class="contenedor">
        <div class="form-container bloque-temperatura">
            <h2>Temperatura en Lima</h2>
            <div class="temperatura-valor" id="temperaturaId"></div>
        </div>

        <div class="form-container bloque-noticias">
            <h2>Noticias</h2>
            <ul id="noticiasListId" class="lista-noticias"></ul>
        </div>

        <div class="form-container bloque-login">
            <h2>Inicia sesión para continuar</h2>

            <form id="loginForm" method="post">
                <input type="text" id="usuarioId" name="usuario" placeholder="Nombre de usuario"><br>
                <input type="password" id="contraseñaId" name="contraseña" placeholder="Contraseña"><br>
                <button type="submit">Iniciar sesión</button>
            </form>

            <div id="msgBox" style="margin-top:10px; font-size:13px;"></div>

            <div style="margin-top:16px; text-align:center;">
                <a href="{% url 'registro' %}" class="link-login">¿No tienes cuenta? Regístrate</a>
            </div>

        </div>
    </div>

    <script>
        const API_BASE_URL = "http://localhost:8000/api";

        //LOGIN
        const msgBox = document.getElementById("msgBox");

        async function login(usuario, contraseña) {
            try {
                const response = await fetch(`${API_BASE_URL}/token/`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: usuario,
                        password: contraseña
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem("accessToken", data.access);
                    localStorage.setItem("refreshToken", data.refresh);

                    msgBox.textContent = "Inicio de sesión exitoso";
                    msgBox.style.color = "green";

                    setTimeout(() => {
                        window.location.href = "{% url 'dashboard' %}";
                    }, 1000);

                } else {
                    msgBox.textContent = "Usuario o contraseña incorrectos.";
                    msgBox.style.color = "red";
                    console.log("Detalle del error:", data);
                }
            } catch (error) {
                console.error("Error en la petición:", error);
                msgBox.textContent = "Ocurrió un problema de conexión con el servidor.";
                msgBox.style.color = "orange";
            }
        }

        const form = document.getElementById("loginForm");
        form.addEventListener("submit", function(event) {
            event.preventDefault();
            const usuario = document.getElementById("usuarioId").value.trim();
            const contraseña = document.getElementById("contraseñaId").value.trim();

            if (!usuario || !contraseña) {
                msgBox.textContent = "Debes ingresar usuario y contraseña.";
                msgBox.style.color = "red";
                return;
            }

            login(usuario, contraseña);
        });

        // Petición para obtener el clima
        async function clima(){
            try {
                const response = await fetch(`${API_BASE_URL}/clima/`);
                const data = await response.json();

                if (response.ok) {
                    document.getElementById("temperaturaId").textContent = data.temperatura + " °C"

                } 
                else {
                    console.log("Detalle del error:", data);
                    document.getElementById("temperaturaId").textContent = "Error al obtener temperatura";
                }
            } catch (error) {
                console.error("Error en la petición:", error);
                document.getElementById("temperaturaId").textContent = "Error de conexión";
            }

        }

        // Petición para obtener la lista de noticias
        async function noticias(){
            try {
                const response = await fetch(`${API_BASE_URL}/noticias/`);
                const data = await response.json();

                if (response.ok) {
                    const noticiasLista = document.getElementById("noticiasListId");

                    noticiasLista.innerHTML = "";

                    data.forEach(noticia => {
                        const li = document.createElement("li");

                        const corte = noticia.description.indexOf("...");

                        const descripcionCorta = corte !== -1 
                            ? noticia.description.substring(0, corte) + "..." 
                            : noticia.description;

                        li.innerHTML = `
                        <h3>${noticia.title}</h3>
                        <p><strong>Fecha:</strong> ${new Date(noticia.published_at).toLocaleString()}</p>
                        <p>${descripcionCorta}</p>
                        `;

                        noticiasLista.appendChild(li);
                    });


                } 
                else {
                    console.log("Detalle del error:", data);
                    document.getElementById("noticiasListId").textContent = "Error al obtener noticias";
                }
            } catch (error) {
                console.error("Error en la petición:", error);
                document.getElementById("noticiasListId").textContent = "Error de conexión";
            }

        }

        clima();
        noticias();
    </script>


</body>
</html>
