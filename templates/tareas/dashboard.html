<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tareas con modal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }

    /* Botón principal */
    #openTareaModalBtn {
      display: block;
      margin: 50px auto;
      background-color: #007BFF;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    #openTareaModalBtn:hover {
      background-color: #0056b3;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
    }

    .modal-content {
      background-color: #fff;
      margin: 5% auto;
      padding: 40px;
      border-radius: 10px;
      width: 400px;
      text-align: center;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
    }

    .close {
      color: #aaa;
      float: right;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
    }

    .close:hover {
      color: #000;
    }

    h3 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      background-color: #007BFF;;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 15px;
    }

    button:hover {
      background-color: #218838;
    }
    /* Listas */
    .tareas-container {
    max-width: 600px;
    margin: 30px auto;
    padding: 20px;
    background: #f9f9f9;
    border-radius: 10px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
    font-family: Arial, sans-serif;
    }

    .tareas-list h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
    }

    .tareas-list ul {
    list-style: none;
    padding: 0;
    margin: 0;
    }

    .tareas-list li {
    background: #fff;
    margin-bottom: 15px;
    padding: 15px;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    box-shadow: 0px 2px 6px rgba(0,0,0,0.05);
    }

    .descripcion {
    font-size: 16px;
    font-weight: bold;
    color: #222;
    }

    .fecha {
    font-size: 14px;
    color: #555;
    }

    .status {
    font-size: 14px;
    font-weight: bold;
    padding: 6px 10px;
    border-radius: 6px;
    width: fit-content;
    }

    .status.terminada {
    background-color: #d4edda;
    color: #155724;
    }

    .status.pendiente {
    background-color: #f8d7da;
    color: #721c24;
    }

    #openTareaModalBtn {
    display: block;
    margin: 0 auto 20px auto;
    padding: 10px 20px;
    background-color: #007BFF;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    }

    #openTareaModalBtn:hover {
    background-color: #0056b3;
    }
    .error {
    margin-top: 10px;
    color: #b00020;
    font-weight: bold;
    }
    /* Botones estado tarea */


  </style>
</head>
<body>

  <div class="tareas-container">
    <button id="openTareaModalBtn" type="button">Tarea nueva</button>
    <button id="logoutBtn" type="button">Logout</button>
    <div class="tareas-list">
        <h2>Mis tareas</h2>
        <ul id="listaTareas"></ul>
    </div>
  </div>


  <div id="tareaModal" class="modal">
    <div class="modal-content">
      <span class="close" id="closeTareaModalBtn">&times;</span>
      <h3 id="modalTitulo"></h3>
      <form id="tareaForm">
        <input type="hidden" id="tareaId" name="tarea">
        <input type="text" id="descripcionId" name="descripcion" placeholder="Descripción de tarea" required><br>
        <label for="fechaFinId">Fecha de fin:</label><br>
        <input type="date" id="fechaFinId" name="fecha_fin" required><br>
        <button type="submit" id="añadirTareaBtn">Añadir</button>
      </form>
      <div id="msgBox" class="error"></div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <script>

    // AXIOS
    const api = axios.create({
    baseURL: "http://localhost:8000/api",  
    headers: { "Content-Type": "application/json" }
    });

    // Interceptor de request: añade el access token
    api.interceptors.request.use(config => {
    const token = localStorage.getItem("accessToken");
    if (token) {
        config.headers["Authorization"] = `Bearer ${token}`;
    }
    return config;
    });

    // Interceptor de response: maneja expiración del token
    api.interceptors.response.use(
    (response) => response,
    async (error) => {
        const originalRequest = error.config;

        if (error.response && error.response.status === 401 && !originalRequest._retry) {
        originalRequest._retry = true;
        try {
            const refreshToken = localStorage.getItem("refreshToken");
            const res = await axios.post("http://localhost:8000/api/token/refresh/", { refresh: refreshToken });
            const newAccess = res.data.access;

            localStorage.setItem("accessToken", newAccess);
            originalRequest.headers["Authorization"] = `Bearer ${newAccess}`;
            return api(originalRequest); // reintenta la petición original
        } catch (refreshError) {
            console.error("Refresh token inválido o vencido:", refreshError);
            localStorage.removeItem("accessToken");
            localStorage.removeItem("refreshToken");
            window.location.href = "{% url 'login' %}"; // redirigir al login
            return Promise.reject(refreshError);
        }
        }

        return Promise.reject(error);
    }
    );

    // CARGAR TAREAS
    async function cargarTareas() {
        try {
            const res = await api.get("/tareas/");
            const tareas = res.data;

            const lista = document.getElementById("listaTareas");
            lista.innerHTML = "";

            tareas.forEach(tarea => {
                const li = document.createElement("li");

                const statusTexto = tarea.status ? "Terminada" : "Pendiente";
                const statusClase = tarea.status ? "terminada" : "pendiente";
                  
                  li.innerHTML = `
                    <div class="tarea">
                      <div class="descripcion">${tarea.descripcion}</div>
                      <div class="fecha">Fecha fin: ${tarea.fecha_fin}</div>
                      <div class="acciones">
                        <div style="display:flex; align-items:center; gap:6px;">
                          <input type="checkbox" class="statusCheck"
                                ${tarea.status ? "checked" : ""}
                                onchange="cambiarEstadoTarea(${tarea.id}, this.checked)">
                          <span>Completada</span>
                        </div>
                        <button class="eliminarBtn" onclick="eliminarTarea(${tarea.id})">✗ Eliminar</button>
                        <button class="editarBtn" onclick="editarTarea(${tarea.id})">Editar</button>
                      </div>
                    </div>
                  `;
                  

                lista.appendChild(li);
            });
            
        } catch (error) {
            console.error("Error al cargar tareas:", error);
        }
    }

    // MODAL AÑADIR TAREA 
    const modal = document.getElementById("tareaModal");
    const openBtn = document.getElementById("openTareaModalBtn");
    const closeBtn = document.getElementById("closeTareaModalBtn");

    openBtn.onclick = function() {
      tareaForm.reset();
      document.getElementById("tareaId").value = "";
      document.getElementById("modalTitulo").textContent = "Añadir tarea";
      modal.style.display = "block";
    }

    closeBtn.onclick = function() {
      modal.style.display = "none";
    }

    window.onclick = function(event) {
      if (event.target == modal) {
        modal.style.display = "none";
      }
    }

    const msgBox = document.getElementById("msgBox");
    document.getElementById("tareaForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        
        Id = document.getElementById("tareaId").value
        const descripcion = document.getElementById('descripcionId').value.trim();
        const fecha_fin = document.getElementById('fechaFinId').value;
        msgBox.textContent = "";


        const nuevaTarea = {
            descripcion: descripcion,
            fecha_fin: fecha_fin
        };

        if(Id){

          try {
            const response = await api.patch(`/tareas/${Id}/`, nuevaTarea);  
            await cargarTareas();
            tareaForm.reset();
            modal.style.display = "none";

          } catch (error) {
              if (error.response) {
                  const data = error.response.data;
                  let mensajes = [];
                  for (const campo in data) {
                      if (Array.isArray(data[campo])) {
                          const texto = data[campo].join(", ");
                          mensajes.push(texto);
                      }
                  }
                  msgBox.textContent = `${mensajes.join(" | ")}`;
              } else if (error.request) {
                  msgBox.textContent = "No se recibió respuesta del servidor.";
              } else {
                  msgBox.textContent = "Error al preparar la petición.";
              }
          }

        }
        else{

          try {
            const response = await api.post("/tareas/", nuevaTarea);  
            await cargarTareas();
            tareaForm.reset();
            modal.style.display = "none";

          } catch (error) {
              if (error.response) {
                  const data = error.response.data;
                  let mensajes = [];
                  for (const campo in data) {
                      if (Array.isArray(data[campo])) {
                          const texto = data[campo].join(", ");
                          mensajes.push(texto);
                      }
                  }
                  msgBox.textContent = `${mensajes.join(" | ")}`;
              } else if (error.request) {
                  msgBox.textContent = "No se recibió respuesta del servidor.";
              } else {
                  msgBox.textContent = "Error al preparar la petición.";
              }
          }
        }
 
        
    });

    // CAMBIAR ESTADO TAREA (PENDIENTE, TERMINADA)
    async function cambiarEstadoTarea(tareaId, estadoActual) {
        try {
            const response = await api.patch(`/tareas/${tareaId}/`, { status: estadoActual });
            await cargarTareas();
        } catch (error) {
            console.error("Error al actualizar estado:", error);
        }
    }

    // ELIMINAR TAREA
    async function eliminarTarea(tareaId) {
        const confirmar = window.confirm("¿Estás seguro de que quieres eliminar esta tarea?");
        if (!confirmar) {
          return;
        }

        try {
            const response = await api.delete(`/tareas/${tareaId}/`);
            await cargarTareas();
        } catch (error) {
            console.error("Error al eliminar tarea:", error);
        }
    }

    // EDITAR TAREA
    async function editarTarea(tareaId) {
      tareaForm.reset();
      document.getElementById("modalTitulo").textContent = "Editar tarea";
      document.getElementById("tareaId").value = tareaId;
      modal.style.display = "block";

      try {
        const res = await api.get(`/tareas/${tareaId}/`);
        const tarea = res.data;   

        document.getElementById("descripcionId").value = tarea.descripcion;
        document.getElementById("fechaFinId").value = tarea.fecha_fin;
        
      } catch (error) {
        console.error("Error al cargar tarea:", error);
      }
    }

    const logoutBtn = document.getElementById("logoutBtn");

    logoutBtn.onclick = function() {
      localStorage.removeItem("accessToken");
      localStorage.removeItem("refreshToken");
      window.location.href = "{% url 'login' %}";
    }

    window.onload = cargarTareas;
  </script>

</body>
</html>
