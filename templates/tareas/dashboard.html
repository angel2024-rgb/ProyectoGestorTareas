<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tareas</title>
  <style>
    /* ── Contenedor principal ── */
    .tareas-container {
      max-width: 600px;
      margin: 2rem auto;
      padding: 0 1rem;
      font-family: sans-serif;
    }

    /* ── Header ── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .app-title {
      font-size: 22px;
      font-weight: 500;
      margin: 0;
    }

    .app-title span {
      font-size: 13px;
      font-weight: 400;
      color: #888;
      margin-left: 8px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Botones del header ── */
    #openTareaModalBtn {
      font-size: 13px;
      padding: 7px 14px;
      border-radius: 8px;
      border: none;
      background: #007BFF;
      color: #fff;
      cursor: pointer;
      font-weight: 500;
    }

    #openTareaModalBtn:hover {
      opacity: 0.85;
    }

    #logoutBtn {
      font-size: 13px;
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: transparent;
      color: #666;
      cursor: pointer;
    }

    #logoutBtn:hover {
      background: #f5f5f5;
    }

    /* ── Filtros ── */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 1rem;
    }

    .filter-btn {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid #ddd;
      background: transparent;
      color: #666;
      cursor: pointer;
    }

    .filter-btn.active {
      background: #111;
      color: #fff;
      border-color: transparent;
    }

    /* ── Lista ── */
    #listaTareas {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Tarjeta de tarea ── */
    .task-card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 14px 16px;
      transition: border-color 0.15s;
    }

    .task-card:hover {
      border-color: #ccc;
    }

    .task-card.completada {
      opacity: 0.55;
    }

    .task-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    /* ── Checkbox ── */
    .task-check {
      margin-top: 2px;
      width: 16px;
      height: 16px;
      accent-color: #1D9E75;
      flex-shrink: 0;
      cursor: pointer;
    }

    /* ── Contenido de la tarea ── */
    .task-body {
      flex: 1;
      min-width: 0;
    }

    .task-desc {
      font-size: 14px;
      font-weight: 500;
      color: #111;
      margin: 0 0 4px;
    }

    .task-card.completada .task-desc {
      text-decoration: line-through;
      color: #aaa;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .task-fecha {
      font-size: 12px;
      color: #888;
    }

    .task-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 500;
    }

    .badge-pendiente {
      background: #FAEEDA;
      color: #854F0B;
    }

    .badge-completada {
      background: #E1F5EE;
      color: #0F6E56;
    }

    /* ── Botones de acción ── */
    .task-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .editarBtn,
    .eliminarBtn {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: transparent;
      color: #666;
      cursor: pointer;
    }

    .editarBtn:hover {
      background: #f5f5f5;
    }

    .eliminarBtn:hover {
      color: #c0392b;
      border-color: #f5c6c6;
      background: #fff5f5;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
    }

    .modal-content {
      background-color: #fff;
      margin: 5% auto;
      padding: 40px;
      border-radius: 10px;
      width: 400px;
      text-align: center;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
    }

    .close {
      color: #aaa;
      float: right;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
    }

    .close:hover {
      color: #000;
    }

    h3 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      background-color: #007BFF;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 15px;
    }

    button:hover {
      background-color: #218838;
    }

    .main-wrapper {
      display: flex;        /* activa el layout en paralelo */
      gap: 20px;            /* espacio entre los contenedores */
    }

    .categorias-container {
      flex: 1;              /* ocupa menos espacio */
      border: 1px solid #ccc;
      padding: 10px;
    }

    .tareas-container {
      flex: 3;              /* ocupa más espacio */
      border: 1px solid #ccc;
      padding: 10px;
    }

    .cat-card {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 5px 0;
      border-radius: 6px;
      cursor: pointer;              /* cambia el cursor */
      transition: background 0.2s;  /* efecto suave */
    }

    .cat-card:hover {
      background-color: #f0f0f0;    /* efecto hover */
    }
  </style>
</head>
<body>


  <div class="main-wrapper">

    <!-- BLOQUE DE CATEGORIAS -->
    <div class="categorias-container">
      <button id="openCategoriaModalBtn" type="button">+ Nueva categoría</button>
      <h3>Categorías</h3>
      <input type="hidden" id="listaCategoriasId">
      <ul id="listaCategorias"></ul>
    </div>

    <!-- BLOQUE DE TAREAS -->
    <div class="tareas-container">
      <div class="app-header">
        <h2 class="app-title">Mis tareas <span id="counter"></span></h2>
        <div class="header-actions">
          <button id="openTareaModalBtn" type="button">+ Nueva tarea</button>
          <button id="logoutBtn" type="button">Salir</button>
        </div>
      </div>
    
      <div class="filter-bar">
        <button class="filter-btn">Todas</button>
        <button class="filter-btn">Pendientes</button>
        <button class="filter-btn">Completadas</button>
        <button class="filter-btn">Atrasadas</button>
      </div>
      <input type="hidden" id="listaTareasId" value="todas">

      <ul id="listaTareas"></ul>       
    </div>

  </div>
  


  <!-- MODAL AÑADIR EDITAR TAREA -->
  <div id="tareaModal" class="modal">
    <div class="modal-content">
      <span class="close" id="closeTareaModalBtn">&times;</span>
      <h3 id="modalTitulo"></h3>
      <form id="tareaForm">
        <input type="hidden" id="tareaId" name="tarea">

        <div class="form-group">
          <label class="form-label">Descripción</label>
          <input type="text" class="form-input" id="descripcionId" name="descripcion" placeholder="¿Qué hay que hacer?" required>
        </div>
        <div class="form-group">
          <label class="form-label">Fecha de fin</label>
          <input type="date" class="form-input" id="fechaFinId" name="fecha_fin" required>
        </div>

        <button type="submit" id="añadirTareaBtn">Añadir</button>
      </form>
      <div id="msgBox" class="error"></div>
    </div>
  </div>

  <!-- MODAL AÑADIR EDITAR CATEGORIA -->
  <div id="categoriaModal" class="modal">
    <div class="modal-content">
      <span class="close" id="closeCategoriaModalBtn">&times;</span>
      <h3 id="catModalTitulo"></h3>
      <form id="categoriaForm">
        <input type="hidden" id="categoriaId" name="categoria">

        <div class="form-group">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-input" id="nombreId" name="nombre" placeholder="Nombre de categoría" required>
        </div>

        <button type="submit" id="añadirCategoríaBtn">Añadir</button>
      </form>
      <div id="catMsgBox" class="error"></div>
    </div>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <script>

    let listaTareasId = document.getElementById("listaTareasId").value
    let listaCategoriasId = document.getElementById("listaCategoriasId").value

    // AXIOS
    const api = axios.create({
    baseURL: "http://localhost:8000/api",  
    headers: { "Content-Type": "application/json" }
    });

    // Interceptor de request: añade el access token
    api.interceptors.request.use(config => {
    const token = localStorage.getItem("accessToken");
    if (token) {
        config.headers["Authorization"] = `Bearer ${token}`;
    }
    return config;
    });

    // Interceptor de response: maneja expiración del token
    api.interceptors.response.use(
    (response) => response,
    async (error) => {
        const originalRequest = error.config;

        if (error.response && error.response.status === 401 && !originalRequest._retry) {
        originalRequest._retry = true;
        try {
            const refreshToken = localStorage.getItem("refreshToken");
            const res = await axios.post("http://localhost:8000/api/token/refresh/", { refresh: refreshToken });
            const newAccess = res.data.access;

            localStorage.setItem("accessToken", newAccess);
            originalRequest.headers["Authorization"] = `Bearer ${newAccess}`;
            return api(originalRequest); // reintenta la petición original
        } catch (refreshError) {
            console.error("Refresh token inválido o vencido:", refreshError);
            localStorage.removeItem("accessToken");
            localStorage.removeItem("refreshToken");
            window.location.href = "{% url 'login' %}"; // redirigir al login
            return Promise.reject(refreshError);
        }
        }

        return Promise.reject(error);
    }
    );


    // CARGAR CATEGORIAS
    async function cargarCategorias() {

        try {
            const res = await api.get(`/categorias/`);
            const categorias = res.data;

            const lista = document.getElementById("listaCategorias");
            lista.innerHTML = "";

            categorias.forEach(categoria => {
              const li = document.createElement("li");

              li.innerHTML = `
                <div class="cat-card" id="cat-${categoria.id}">
                  <p class="cat-name">${categoria.nombre}</p>
                  <button class="btn" onclick="editarCategoria(${categoria.id})">Editar</button>
                  <button class="btn btn-danger" onclick="eliminarCategoria(${categoria.id})">✕</button>
                </div>
              `;

              li.querySelector(".cat-card").addEventListener("click", async () => {
                await cargarTareas('todas', categoria.id);
              });

              lista.appendChild(li);
            });
            
        } catch (error) {
            console.error("Error al cargar categorias:", error);
        }
    }

    // CARGAR TAREAS
    async function cargarTareas(listaTareasId, listaCategoriasId) {
        document.getElementById("listaTareasId").value  = listaTareasId
        document.getElementById("listaCategoriasId").value  = listaCategoriasId

        try {
            const res = await api.get(`/tareas/?status=${listaTareasId}&categoria=${listaCategoriasId}`);
            const tareas = res.data;

            const lista = document.getElementById("listaTareas");
            lista.innerHTML = "";

            tareas.forEach(tarea => {
                const li = document.createElement("li");

                const statusTexto = tarea.status ? "Terminada" : "Pendiente";
                const statusClase = tarea.status ? "terminada" : "pendiente";
                  
                  li.innerHTML = `
                  <div class="task-card ${tarea.status ? 'completada' : ''}" id="t${tarea.id}">
                    <div class="task-top">
                      <input type="checkbox" class="task-check"
                            ${tarea.status ? "checked" : ""}
                            onchange="cambiarEstadoTarea(${tarea.id}, this.checked)">
                      <div class="task-body">
                        <p class="task-desc">${tarea.descripcion}</p>
                        <div class="task-meta">
                          <span class="task-fecha">Fecha fin: ${tarea.fecha_fin}</span>
                          <span class="task-badge ${tarea.status ? 'badge-completada' : 'badge-pendiente'}">
                            ${tarea.status ? 'Completada' : 'Pendiente'}
                          </span>
                        </div>
                      </div>
                      <div class="task-actions">
                        <button class="btn" onclick="editarTarea(${tarea.id})">Editar</button>
                        <button class="btn btn-danger" onclick="eliminarTarea(${tarea.id})">✕</button>
                      </div>
                    </div>
                  </div>
                `;
                  

                lista.appendChild(li);
            });
            
        } catch (error) {
            console.error("Error al cargar tareas:", error);
        }
    }


    // AÑADIR EDITAR CATEGORIA 
    const catModal = document.getElementById("categoriaModal");
    const openCatBtn = document.getElementById("openCategoriaModalBtn");
    const closeCatBtn = document.getElementById("closeCategoriaModalBtn");

    openCatBtn.onclick = function() {
      categoriaForm.reset();
      document.getElementById("categoriaId").value = "";
      document.getElementById("catModalTitulo").textContent = "Añadir categoría";
      catModal.style.display = "block";
    }

    closeCatBtn.onclick = function() {
      catModal.style.display = "none";
    }

    window.onclick = function(event) {
      if (event.target == modal) {
        catModal.style.display = "none";
      }
    }

    const catMsgBox = document.getElementById("catMsgBox");
    document.getElementById("categoriaForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        
        Id = document.getElementById("categoriaId").value
        const nombre = document.getElementById('nombreId').value.trim();
        catMsgBox.textContent = "";

        let nuevaCategoria = {
            nombre: nombre
        };

        // EDITAR
        if(Id){

          try {
            const response = await api.patch(`/categorias/${Id}/`, nuevaCategoria);
            await cargarCategorias();
            categoriaForm.reset();
            catModal.style.display = "none";

          } catch (error) {
              if (error.response) {
                  const data = error.response.data;
                  let mensajes = [];
                  for (const campo in data) {
                      if (Array.isArray(data[campo])) {
                          const texto = data[campo].join(", ");
                          mensajes.push(texto);
                      }
                  }
                  catMsgBox.textContent = `${mensajes.join(" | ")}`;
              } else if (error.request) {
                  catMsgBox.textContent = "No se recibió respuesta del servidor.";
              } else {
                  catMsgBox.textContent = "Error al preparar la petición.";
              }
          }

        }
        // AÑADIR
        else{

          try {
            const response = await api.post("/categorias/", nuevaCategoria); 
            await cargarCategorias();
            categoriaForm.reset();
            catModal.style.display = "none";

          } catch (error) {
              if (error.response) {
                  const data = error.response.data;
                  let mensajes = [];
                  for (const campo in data) {
                      if (Array.isArray(data[campo])) {
                          const texto = data[campo].join(", ");
                          mensajes.push(texto);
                      }
                  }
                  catMsgBox.textContent = `${mensajes.join(" | ")}`;
              } else if (error.request) {
                  catMsgBox.textContent = "No se recibió respuesta del servidor.";
              } else {
                  catMsgBox.textContent = "Error al preparar la petición.";
              }
          }
        }
 
        
    });

    // AÑADIR EDITAR TAREA 
    const modal = document.getElementById("tareaModal");
    const openBtn = document.getElementById("openTareaModalBtn");
    const closeBtn = document.getElementById("closeTareaModalBtn");

    openBtn.onclick = function() {
      categoria = document.getElementById('listaCategoriasId').value;

      if (!categoria){
        alert("Escoja una categoría");
        return;
      }

      tareaForm.reset();
      document.getElementById("tareaId").value = "";
      document.getElementById("modalTitulo").textContent = "Añadir tarea";
      modal.style.display = "block";
    }

    closeBtn.onclick = function() {
      modal.style.display = "none";
    }

    window.onclick = function(event) {
      if (event.target == modal) {
        modal.style.display = "none";
      }
    }

    const msgBox = document.getElementById("msgBox");
    document.getElementById("tareaForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        
        Id = document.getElementById("tareaId").value
        const descripcion = document.getElementById('descripcionId').value.trim();
        const fecha_fin = document.getElementById('fechaFinId').value;
        const categoriaId = document.getElementById('listaCategoriasId').value;
        msgBox.textContent = "";


        let nuevaTarea = {
            descripcion: descripcion,
            categoria: categoriaId
        };

        // EDITAR
        if(Id){

          if (fecha_fin && new Date(fecha_fin) >= new Date()) {
            nuevaTarea.fecha_fin = fecha_fin;
          }

          try {
            const response = await api.patch(`/tareas/${Id}/`, nuevaTarea);
            listaTareasId = document.getElementById("listaTareasId").value
            listaCategoriasId = document.getElementById("listaCategoriasId").value
            await cargarTareas(listaTareasId, listaCategoriasId);
            tareaForm.reset();
            modal.style.display = "none";

          } catch (error) {
              if (error.response) {
                  const data = error.response.data;
                  let mensajes = [];
                  for (const campo in data) {
                      if (Array.isArray(data[campo])) {
                          const texto = data[campo].join(", ");
                          mensajes.push(texto);
                      }
                  }
                  msgBox.textContent = `${mensajes.join(" | ")}`;
              } else if (error.request) {
                  msgBox.textContent = "No se recibió respuesta del servidor.";
              } else {
                  msgBox.textContent = "Error al preparar la petición.";
              }
          }

        }
        // AÑADIR
        else{

          nuevaTarea.fecha_fin = fecha_fin;

          try {
            const response = await api.post("/tareas/", nuevaTarea);
            listaTareasId = document.getElementById("listaTareasId").value
            listaCategoriasId = document.getElementById("listaCategoriasId").value  
            await cargarTareas(listaTareasId, listaCategoriasId);
            tareaForm.reset();
            modal.style.display = "none";

          } catch (error) {
              if (error.response) {
                  const data = error.response.data;
                  let mensajes = [];
                  for (const campo in data) {
                      if (Array.isArray(data[campo])) {
                          const texto = data[campo].join(", ");
                          mensajes.push(texto);
                      }
                  }
                  msgBox.textContent = `${mensajes.join(" | ")}`;
              } else if (error.request) {
                  msgBox.textContent = "No se recibió respuesta del servidor.";
              } else {
                  msgBox.textContent = "Error al preparar la petición.";
              }
          }
        }
 
        
    });

    // CAMBIAR ESTADO TAREA (PENDIENTE, TERMINADA)
    async function cambiarEstadoTarea(tareaId, estadoActual) {
        try {
            const response = await api.patch(`/tareas/${tareaId}/`, { status: estadoActual });
            listaTareasId = document.getElementById("listaTareasId").value
            listaCategoriasId = document.getElementById("listaCategoriasId").value
            await cargarTareas(listaTareasId, listaCategoriasId);
        } catch (error) {
            console.error("Error al actualizar estado:", error);
        }
    }

    // ELIMINAR TAREA
    async function eliminarTarea(tareaId) {
        const confirmar = window.confirm("¿Estás seguro de que quieres eliminar esta tarea?");
        if (!confirmar) {
          return;
        }

        try {
            const response = await api.delete(`/tareas/${tareaId}/`);
            listaTareasId = document.getElementById("listaTareasId").value
            listaCategoriasId = document.getElementById("listaCategoriasId").value
            await cargarTareas(listaTareasId, listaCategoriasId);
        } catch (error) {
            console.error("Error al eliminar tarea:", error);
        }
    }

    // EDITAR TAREA
    async function editarTarea(tareaId) {
      tareaForm.reset();
      document.getElementById("modalTitulo").textContent = "Editar tarea";
      document.getElementById("tareaId").value = tareaId;
      modal.style.display = "block";

      try {
        const res = await api.get(`/tareas/${tareaId}/`);
        const tarea = res.data;   

        document.getElementById("descripcionId").value = tarea.descripcion;
        document.getElementById("fechaFinId").value = tarea.fecha_fin;
        
      } catch (error) {
        console.error("Error al editar tarea:", error);
      }
    }

    // ELIMINAR CATEGORIA
    async function eliminarCategoria(categoriaId) {
        const confirmar = window.confirm("¿Estás seguro de que quieres eliminar esta categoría?");
        if (!confirmar) {
          return;
        }

        try {
            const response = await api.delete(`/categorias/${categoriaId}/`);
            await cargarCategorias();
            await cargarTareas('todas', "");
        } catch (error) {
            console.error("Error al eliminar categoría:", error);
        }
    }

    // EDITAR CATEGORIA
    async function editarCategoria(categoriaId) {
      categoriaForm.reset();
      document.getElementById("catModalTitulo").textContent = "Editar categoría";
      document.getElementById("categoriaId").value = categoriaId;
      catModal.style.display = "block";

      try {
        const res = await api.get(`/categorias/${categoriaId}/`);
        const categoria = res.data;   

        document.getElementById("nombreId").value = categoria.nombre;
        
      } catch (error) {
        console.error("Error al editar categoria:", error);
      }
    }

    // LOGOUT
    const logoutBtn = document.getElementById("logoutBtn");

    logoutBtn.onclick = function() {
      localStorage.removeItem("accessToken");
      localStorage.removeItem("refreshToken");
      window.location.href = "{% url 'login' %}";
    }

    //LÓGICA DE BOTONES FILTRO
    const botones = document.querySelectorAll(".filter-btn");

    botones.forEach(boton => {
      boton.addEventListener("click", () => {
        botones.forEach(b => b.classList.remove("active"));
        boton.classList.add("active");

        const estado = boton.textContent.toLowerCase();
        listaCategoriasId = document.getElementById("listaCategoriasId").value 
        cargarTareas(estado, listaCategoriasId);
      });
    });

    // SE MARCA EL BOTÓN TODAS Y SE CARGAN LAS TAREAS AL INICIAR
    window.addEventListener("DOMContentLoaded", () => {
      const botonTodas = document.querySelector(".filter-btn:first-child");

      botonTodas.classList.add("active");
 
      cargarTareas('todas', "");
    });

    cargarCategorias();
  </script>

</body>
</html>
